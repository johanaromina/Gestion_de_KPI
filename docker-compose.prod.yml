services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - 127.0.0.1:${MYSQL_PORT:-33060}:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_ENCRYPTION_KEY: ${AUTH_ENCRYPTION_KEY}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MFA_TTL_MIN: ${MFA_TTL_MIN:-10}
      RESET_TTL_MIN: ${RESET_TTL_MIN:-60}
      SSO_STATE_TTL_MIN: ${SSO_STATE_TTL_MIN:-10}
      SSO_HANDOFF_TTL_MIN: ${SSO_HANDOFF_TTL_MIN:-5}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INTEGRATIONS_RUN_DELAY_MS: ${INTEGRATIONS_RUN_DELAY_MS:-2000}
      INTEGRATIONS_RETRY_MS: ${INTEGRATIONS_RETRY_MS:-60000}
      INTEGRATIONS_CACHE_HOURS: ${INTEGRATIONS_CACHE_HOURS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - 127.0.0.1:${BACKEND_PORT:-5000}:5000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - ${FRONTEND_PORT:-8080}:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql_data:
